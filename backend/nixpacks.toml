[phases.setup]
nixPkgs = ["tesseract", "poppler_utils", "libgl1", "libglib2.0"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
```

---

Also, some packages in `requirements.txt` cause build failures on Railway. Replace the entire `backend/requirements.txt` with this leaner version that removes problematic dependencies:
```
fastapi==0.111.0
uvicorn[standard]==0.30.0
python-multipart==0.0.9
pydantic==2.7.1
pydantic-settings==2.3.0

