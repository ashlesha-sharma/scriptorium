---

**Then on Railway, do this:**

1. Go to your Railway project → **Settings** tab
2. Find **Build Command** — clear it (leave blank, let nixpacks handle it)
3. Find **Start Command** — set it to:
```
uvicorn main:app --host 0.0.0.0 --port $PORT
